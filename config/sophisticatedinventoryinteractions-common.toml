
#Common settings
[common]
	#Default eligibility policy when no force/include/exclude/safe-list rule matches
	#Allowed Values: DENY_BY_DEFAULT, ALLOW_BY_DEFAULT
	defaultPolicy = "DENY_BY_DEFAULT"

	[common.forceInclude]
		#Menu class rules support exact class names and prefix matches using '*' suffix, e.g. net.minecraft.world.inventory.*
		menuClasses = []

	[common.exclude]
		menuClasses = []

	[common.include]
		menuClasses = []

	[common.safeList]
		menuClasses = ["net.minecraft.world.inventory.ChestMenu", "net.minecraft.world.inventory.HopperMenu", "net.minecraft.world.inventory.DispenserMenu", "net.minecraft.world.inventory.ShulkerBoxMenu"]

	[common.layout]
		anchorOffsetOverrides = []

