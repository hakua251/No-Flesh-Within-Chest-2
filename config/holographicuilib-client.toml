
[theme]
	#当前使用的主题ID
	#可用主题: default, cyberpunk, matrix, lava, frost
	id = "default"

	[theme.colors]
		#主色调覆盖 (格式: #AARRGGBB, 留空使用主题默认)
		primary = ""
		#次色调覆盖 (格式: #AARRGGBB, 留空使用主题默认)
		secondary = ""
		#背景色覆盖 (格式: #AARRGGBB, 留空使用主题默认)
		background = ""
		#边框色覆盖 (格式: #AARRGGBB, 留空使用主题默认)
		border = ""
		#文字色覆盖 (格式: #AARRGGBB, 留空使用主题默认)
		text = ""

[animation]
	#全息扫描线速度
	#Range: 0.0 ~ 5.0
	scanline_speed = 1.0
	#全息闪烁强度
	#Range: 0.0 ~ 1.0
	flicker_intensity = 0.15
	#边框发光强度
	#Range: 0.0 ~ 2.0
	glow_intensity = 0.5

[tooltip]
	#工具提示显示延迟 (毫秒)
	#Range: 0 ~ 5000
	delay = 500
	#工具提示淡出时间 (毫秒)
	#Range: 0 ~ 2000
	fade_out = 200
	#是否启用工具提示动画
	animated = true

[effects]
	#是否启用全息特效
	holographic = true
	#是否启用扫描线效果
	scanlines = true
	#是否启用发光效果
	glow = true

[keybindings]
	#打开示例UI的按键码 (GLFW键码)
	#Range: 0 ~ 512
	open_example_ui = 85
	#打开UI编辑器的按键码 (GLFW键码)
	#Range: 0 ~ 512
	open_editor = 69

